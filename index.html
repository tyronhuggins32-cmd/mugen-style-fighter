<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#070912">
<title>Saiyan Clash — MUGEN-style Prototype</title>
<style>
:root{color-scheme:dark;--bg:#070912;--panel:#111522;--line:rgba(255,255,255,.15);--text:#f7f8ff;--muted:#8e96b1;--cyan:#76ecff;--pink:#ff63d7}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,rgba(70,63,200,.24),transparent 36rem),linear-gradient(#0a0d19,#070912 68%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
body{min-height:100dvh;padding:max(12px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(14px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left))}
button{font:inherit;color:inherit}.app{width:min(1120px,100%);margin:auto}.topbar{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-bottom:10px}.eyebrow{margin:0 0 4px;color:var(--cyan);font-weight:900;font-size:.68rem;letter-spacing:.18em}.title{margin:0;font-size:clamp(1.7rem,6vw,3rem);line-height:.95;letter-spacing:.04em}.restart{border:1px solid rgba(118,236,255,.55);border-radius:999px;background:linear-gradient(rgba(118,236,255,.18),rgba(118,236,255,.06));padding:10px 16px;font-weight:900;white-space:nowrap}
.game-wrap{position:relative;overflow:hidden;width:100%;aspect-ratio:16/9;border:1px solid var(--line);border-radius:18px;background:#0d1222;box-shadow:0 22px 65px rgba(0,0,0,.48)}canvas{display:block;width:100%;height:100%;touch-action:none}.start-overlay{position:absolute;inset:0;display:grid;place-items:center;padding:18px;background:linear-gradient(rgba(4,6,12,.42),rgba(4,6,12,.86));backdrop-filter:blur(4px);transition:opacity .18s}.start-overlay.hidden{opacity:0;pointer-events:none}.start-card{width:min(540px,100%);padding:26px;border:1px solid rgba(255,255,255,.18);border-radius:22px;background:linear-gradient(145deg,rgba(18,22,38,.97),rgba(10,12,24,.9));text-align:center}.start-card h2{margin:0 0 8px;font-size:clamp(1.8rem,8vw,3.4rem)}.start-card p{margin:0 0 16px;color:#aeb5ca;line-height:1.45}.start-card button{min-width:190px;border:1px solid rgba(118,236,255,.55);border-radius:999px;background:linear-gradient(rgba(118,236,255,.22),rgba(118,236,255,.07));padding:13px 18px;font-weight:900}
.controls{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 2px 4px;touch-action:none;user-select:none;-webkit-user-select:none}.cluster{display:grid;gap:8px}.dpad{grid-template-columns:repeat(3,minmax(50px,76px))}.actions{grid-template-columns:repeat(2,minmax(50px,72px))}.control{min-height:58px;border:1px solid rgba(255,255,255,.2);border-radius:18px;background:linear-gradient(#1c2338,#111522);font-weight:1000;font-size:1.12rem;box-shadow:inset 0 1px rgba(255,255,255,.08),0 6px 15px rgba(0,0,0,.26);touch-action:none}.control.active,.control:active{transform:translateY(2px) scale(.98);filter:brightness(1.35)}.light{border-color:rgba(118,236,255,.55)}.heavy{border-color:rgba(255,198,81,.62)}.special{border-color:rgba(255,99,215,.58)}.block{border-color:rgba(161,128,255,.62)}
.statusbar{display:flex;justify-content:space-between;gap:12px;padding:8px 2px 0;color:#78819c;font-size:.72rem}
@media(max-width:560px){.restart{padding:8px 11px;font-size:.76rem}.game-wrap{border-radius:12px}.controls{gap:10px}.dpad{grid-template-columns:repeat(3,minmax(48px,60px))}.actions{grid-template-columns:repeat(2,minmax(48px,58px))}.control{min-height:54px;border-radius:15px}.statusbar{font-size:.64rem}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div><p class="eyebrow">MUGEN-STYLE ENGINE TEST</p><h1 class="title">SAIYAN CLASH</h1></div>
    <button id="restartBtn" class="restart" type="button">Restart Round</button>
  </header>

  <section class="game-wrap" aria-label="Fighting game arena">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="startOverlay" class="start-overlay">
      <div class="start-card">
        <p class="eyebrow">PLAYABLE BUILD v0.2</p>
        <h2>GOKU VS VEGETA</h2>
        <p>Fight with mobile controls. S fires an energy attack. B blocks while held.</p>
        <button id="startBtn" type="button">Tap to Fight</button>
      </div>
    </div>
  </section>

  <section class="controls" aria-label="Touch controls">
    <div class="cluster dpad">
      <button class="control" data-action="left" type="button">◀</button>
      <button class="control" data-action="jump" type="button">▲</button>
      <button class="control" data-action="right" type="button">▶</button>
    </div>
    <div class="cluster actions">
      <button class="control light" data-action="light" type="button">L</button>
      <button class="control heavy" data-action="heavy" type="button">H</button>
      <button class="control special" data-action="special" type="button">S</button>
      <button class="control block" data-action="block" type="button">B</button>
    </div>
  </section>
  <footer class="statusbar"><span id="controlStatus">Controls ready</span><span>Fixed 60 FPS simulation</span></footer>
</main>
<script>
'use strict';

const WORLD={width:960,height:540,floorY:454,left:35,right:925,gravity:2200};
const ATTACKS={
  light:{startup:.07,active:.08,recovery:.16,damage:6,range:58,height:72,hitstun:.22,kx:220,ky:-90},
  heavy:{startup:.15,active:.10,recovery:.30,damage:13,range:84,height:84,hitstun:.34,kx:410,ky:-220},
  special:{startup:.34,active:.05,recovery:.46,damage:18,range:0,height:0,hitstun:.42,kx:520,ky:-160}
};

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('startOverlay');
const startBtn=document.getElementById('startBtn');
const restartBtn=document.getElementById('restartBtn');
const controlStatus=document.getElementById('controlStatus');

class InputManager{
  constructor(){this.held=new Set();this.pressed=new Set();this.pointerMap=new Map();this.bindKeyboard();this.bindButtons();}
  press(action){if(action==='left'||action==='right'||action==='block')this.held.add(action);else this.pressed.add(action);controlStatus.textContent=`Input: ${action.toUpperCase()}`;}
  release(action){this.held.delete(action);}
  consume(action){const yes=this.pressed.has(action);this.pressed.delete(action);return yes;}
  isHeld(action){return this.held.has(action);}
  clear(){this.held.clear();this.pressed.clear();this.pointerMap.clear();document.querySelectorAll('.control.active').forEach(b=>b.classList.remove('active'));}
  bindKeyboard(){
    const map={ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',ArrowUp:'jump',KeyW:'jump',KeyJ:'light',KeyK:'heavy',KeyL:'special',KeyI:'block',ShiftLeft:'block'};
    addEventListener('keydown',e=>{const a=map[e.code];if(!a)return;e.preventDefault();if(!e.repeat)this.press(a);});
    addEventListener('keyup',e=>{const a=map[e.code];if(!a)return;e.preventDefault();this.release(a);});
    addEventListener('blur',()=>this.clear());
  }
  bindButtons(){
    document.querySelectorAll('[data-action]').forEach(btn=>{
      const action=btn.dataset.action;
      if('PointerEvent' in window){
        btn.addEventListener('pointerdown',e=>{e.preventDefault();this.pointerMap.set(e.pointerId,action);btn.setPointerCapture?.(e.pointerId);this.press(action);btn.classList.add('active');},{passive:false});
        const up=e=>{e.preventDefault();const a=this.pointerMap.get(e.pointerId)||action;this.pointerMap.delete(e.pointerId);if(![...this.pointerMap.values()].includes(a))this.release(a);btn.classList.remove('active');};
        btn.addEventListener('pointerup',up,{passive:false});btn.addEventListener('pointercancel',up,{passive:false});btn.addEventListener('lostpointercapture',up,{passive:false});
      }else{
        btn.addEventListener('touchstart',e=>{e.preventDefault();this.press(action);btn.classList.add('active');},{passive:false});
        btn.addEventListener('touchend',e=>{e.preventDefault();this.release(action);btn.classList.remove('active');},{passive:false});
        btn.addEventListener('touchcancel',()=>{this.release(action);btn.classList.remove('active');},{passive:false});
      }
      btn.addEventListener('contextmenu',e=>e.preventDefault());
    });
  }
}

class Fighter{
  constructor(kind,x,isCPU=false){this.kind=kind;this.isCPU=isCPU;this.width=64;this.height=154;this.startX=x;this.reset();}
  reset(){this.x=this.startX;this.y=WORLD.floorY-this.height;this.vx=0;this.vy=0;this.health=100;this.facing=this.isCPU?-1:1;this.onGround=true;this.state='idle';this.attack=null;this.attackT=0;this.hitstun=0;this.blockstun=0;this.blocking=false;this.flash=0;this.combo=0;this.comboT=0;this.specialSpawned=false;}
  canAct(){return this.health>0&&this.hitstun<=0&&this.blockstun<=0&&!this.attack;}
  command(dt,c){
    if(this.health<=0)return;
    this.blocking=Boolean(c.block&&this.onGround&&!this.attack&&this.hitstun<=0);
    if(this.hitstun>0||this.blockstun>0)return;
    if(this.attack)return;
    if(c.jump&&this.onGround){this.vy=-850;this.onGround=false;this.state='jump';}
    if(c.light){this.startAttack('light');return;}
    if(c.heavy){this.startAttack('heavy');return;}
    if(c.special){this.startAttack('special');return;}
    if(this.blocking){this.vx=0;this.state='block';return;}
    const dir=(c.right?1:0)-(c.left?1:0);
    if(dir&&this.onGround){this.vx=dir*(this.kind==='goku'?305:285);this.state='walk';}
    else if(this.onGround)this.state='idle';
  }
  startAttack(name){if(!this.canAct())return;this.attack=name;this.attackT=0;this.specialSpawned=false;this.state='attack';this.vx*=.2;}
  update(dt,c,opponent){
    this.flash=Math.max(0,this.flash-dt*5);this.comboT=Math.max(0,this.comboT-dt);if(this.comboT<=0)this.combo=0;
    if(this.hitstun>0){this.hitstun=Math.max(0,this.hitstun-dt);this.state=this.health<=0?'ko':'hit';}
    if(this.blockstun>0){this.blockstun=Math.max(0,this.blockstun-dt);this.state='block';}
    this.command(dt,c);
    if(this.attack){this.attackT+=dt;const a=ATTACKS[this.attack];if(this.attackT>=a.startup+a.active+a.recovery){this.attack=null;this.attackT=0;this.state=this.onGround?'idle':'fall';}}
    if(!this.onGround){this.vy+=WORLD.gravity*dt;if(this.vy>0&&this.state==='jump')this.state='fall';}
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    const ground=WORLD.floorY-this.height;
    if(this.y>=ground){this.y=ground;this.vy=0;this.onGround=true;if(this.state==='jump'||this.state==='fall')this.state='idle';}else this.onGround=false;
    this.vx*=Math.pow(this.onGround?.0006:.05,dt);
    this.x=Math.max(WORLD.left,Math.min(WORLD.right-this.width,this.x));
    if(!this.attack&&this.hitstun<=0&&this.blockstun<=0&&this.health>0)this.facing=(opponent.x+opponent.width/2)>=this.x+this.width/2?1:-1;
  }
  attackBox(){
    if(!this.attack||this.attack==='special')return null;const a=ATTACKS[this.attack];if(this.attackT<a.startup||this.attackT>a.startup+a.active)return null;
    return{x:this.facing>0?this.x+this.width-8:this.x-a.range+8,y:this.y+35,width:a.range,height:a.height,attack:this.attack};
  }
  hurtBox(){return{x:this.x+10,y:this.y+10,width:this.width-20,height:this.height-10};}
  receive(attacker,attackName){
    const a=ATTACKS[attackName];const front=(attacker.x-this.x)*this.facing>0;
    if(this.blocking&&front&&this.onGround){this.health=Math.max(0,this.health-Math.max(1,Math.round(a.damage*.12)));this.blockstun=.16;this.vx=attacker.facing*a.kx*.16;return true;}
    this.health=Math.max(0,this.health-a.damage);this.hitstun=a.hitstun;this.vx=attacker.facing*a.kx;this.vy=a.ky;if(a.ky<0)this.onGround=false;this.flash=1;return false;
  }
  draw(time){const cx=this.x+this.width/2;const feet=this.y+this.height;const bob=this.state==='idle'?Math.sin(time*5+this.x*.02)*2:0;ctx.save();ctx.translate(cx,feet+bob);ctx.scale(this.facing,1);if(this.state==='hit')ctx.rotate(-.16);if(this.state==='block')ctx.rotate(-.06);if(this.flash>0){ctx.globalCompositeOperation='screen';}
    if(this.kind==='goku')drawGoku(this,time);else drawVegeta(this,time);ctx.restore();}
}

function limb(x1,y1,x2,y2,w,color){ctx.strokeStyle=color;ctx.lineWidth=w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo((x1+x2)/2,(y1+y2)/2+2);ctx.lineTo(x2,y2);ctx.stroke();}
function poly(points,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();}
function oval(x,y,rx,ry,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();}
function roundRect(x,y,w,h,r,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}

function poseFor(f){
  const walk=f.state==='walk'?Math.sin(performance.now()/90)*12:0;let frontHand=[27,-72],backHand=[-24,-76],frontFoot=[15+walk,-2],backFoot=[-15-walk,-2];
  if(!f.onGround){frontFoot=[21,-18];backFoot=[-20,-10];frontHand=[20,-88];backHand=[-20,-82];}
  if(f.state==='block'){frontHand=[22,-109];backHand=[25,-83];frontFoot=[18,-2];backFoot=[-19,-2];}
  if(f.attack){const a=ATTACKS[f.attack],p=Math.min(1,f.attackT/(a.startup+a.active));const e=Math.sin(Math.min(1,p)*Math.PI/2);
    if(f.attack==='light')frontHand=[30+47*e,-84];
    if(f.attack==='heavy'){frontHand=[30+67*e,-64-18*e];backHand=[-11,-104];}
    if(f.attack==='special'){frontHand=[34+34*e,-82];backHand=[18+23*e,-72];frontFoot=[22,-2];backFoot=[-24,-2];}
  }
  return{frontHand,backHand,frontFoot,backFoot};
}

function drawGoku(f,time){
  const p=poseFor(f),skin='#f2b185',orange=f.flash>0?'#fff':'#f58a24',blue='#173da8',dark='#10131d';
  if(f.attack==='special'){const r=12+Math.sin(time*25)*3;const g=ctx.createRadialGradient(58,-79,2,58,-79,r*2.7);g.addColorStop(0,'#fff');g.addColorStop(.35,'#74eaff');g.addColorStop(1,'rgba(50,150,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(58,-79,r*2.7,0,Math.PI*2);ctx.fill();}
  limb(-9,-50,p.backFoot[0],p.backFoot[1],19,orange);limb(-13,-105,p.backHand[0],p.backHand[1],15,skin);
  roundRect(-24,-112,48,64,12,orange);poly([[-19,-109],[0,-92],[19,-109],[12,-124],[-12,-124]],blue);roundRect(-25,-58,50,10,3,blue);
  limb(9,-50,p.frontFoot[0],p.frontFoot[1],20,orange);limb(13,-104,p.frontHand[0],p.frontHand[1],16,skin);
  oval(p.frontHand[0],p.frontHand[1],8,8,blue);oval(p.backHand[0],p.backHand[1],8,8,blue);
  roundRect(p.frontFoot[0]-10,p.frontFoot[1]-7,22,11,4,blue);roundRect(p.backFoot[0]-10,p.backFoot[1]-7,22,11,4,blue);
  roundRect(-7,-129,14,20,5,skin);oval(0,-141,19,22,skin);
  // Goku hair silhouette
  poly([[-17,-154],[-31,-166],[-17,-165],[-25,-184],[-8,-170],[-8,-193],[3,-173],[13,-194],[14,-171],[31,-184],[20,-162],[35,-164],[18,-151],[13,-138],[-14,-138]],dark);
  // ear + face details
  oval(-18,-141,4,7,skin);ctx.strokeStyle='#34231d';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(3,-146);ctx.lineTo(13,-148);ctx.moveTo(4,-141);ctx.lineTo(13,-141);ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(10,-147,2,4);
  // gi emblem hint
  ctx.fillStyle='#f4efe0';ctx.beginPath();ctx.arc(-13,-88,7,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-16,-91);ctx.lineTo(-10,-85);ctx.moveTo(-10,-91);ctx.lineTo(-16,-85);ctx.stroke();
}

function drawVegeta(f,time){
  const p=poseFor(f),skin='#efb07f',blue=f.flash>0?'#fff':'#182a9e',white='#edf2ff',gold='#d8a637',dark='#0b0e17';
  if(f.attack==='special'){const r=13+Math.sin(time*25)*3;const g=ctx.createRadialGradient(58,-80,2,58,-80,r*2.8);g.addColorStop(0,'#fff');g.addColorStop(.35,'#c55cff');g.addColorStop(1,'rgba(130,40,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(58,-80,r*2.8,0,Math.PI*2);ctx.fill();}
  limb(-9,-49,p.backFoot[0],p.backFoot[1],18,blue);limb(-14,-104,p.backHand[0],p.backHand[1],14,blue);
  roundRect(-23,-113,46,66,10,blue);roundRect(-27,-111,54,42,10,white);poly([[-23,-107],[-9,-65],[9,-65],[23,-107],[16,-112],[-16,-112]],white);roundRect(-17,-81,34,11,3,gold);roundRect(-15,-67,30,8,2,gold);
  limb(9,-49,p.frontFoot[0],p.frontFoot[1],19,blue);limb(14,-104,p.frontHand[0],p.frontHand[1],15,blue);
  oval(p.frontHand[0],p.frontHand[1],9,9,white);oval(p.backHand[0],p.backHand[1],9,9,white);
  roundRect(p.frontFoot[0]-11,p.frontFoot[1]-10,23,14,4,white);roundRect(p.backFoot[0]-11,p.backFoot[1]-10,23,14,4,white);ctx.fillStyle=gold;ctx.fillRect(p.frontFoot[0]-9,p.frontFoot[1]-9,18,4);ctx.fillRect(p.backFoot[0]-9,p.backFoot[1]-9,18,4);
  roundRect(-7,-130,14,20,5,skin);oval(0,-143,18,22,skin);
  // Vegeta hair + widow's peak
  poly([[-17,-153],[-25,-174],[-13,-168],[-15,-194],[-3,-174],[0,-204],[7,-175],[18,-199],[17,-170],[31,-184],[20,-155],[11,-139],[2,-146],[-8,-139]],dark);
  poly([[-8,-158],[0,-148],[8,-158],[7,-151],[0,-145],[-7,-151]],dark);
  ctx.strokeStyle='#2c1f1b';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(2,-147);ctx.lineTo(13,-149);ctx.moveTo(3,-141);ctx.lineTo(13,-142);ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(10,-148,2,4);
}

class CPU{
  constructor(){this.timer=0;this.intent={};}
  reset(){this.timer=0;this.intent={};}
  update(dt,self,opp){this.timer-=dt;if(this.timer>0)return this.intent;this.timer=.08+Math.random()*.10;const dx=opp.x-self.x,d=Math.abs(dx),toward=dx>0?'right':'left',away=dx>0?'left':'right';const c={};
    if(self.hitstun>0||self.blockstun>0)return c;if(opp.attack&&d<120&&Math.random()<.65){c.block=true;return c;}if(d>230){c[toward]=true;if(d>420&&self.onGround&&Math.random()<.08)c.jump=true;return c;}if(d<60&&Math.random()<.2){c[away]=true;return c;}if(self.canAct()){const r=Math.random();if(d<85&&r<.48)c.light=true;else if(d<120&&r<.75)c.heavy=true;else if(d<360)c.special=true;else c[toward]=true;}return c;}
}

const input=new InputManager();const cpu=new CPU();const goku=new Fighter('goku',180,false);const vegeta=new Fighter('vegeta',720,true);const projectiles=[];const particles=[];let running=false,last=0,acc=0,shake=0,banner='',bannerT=0;
function overlap(a,b){return a.x<b.x+b.width&&a.x+a.width>b.x&&a.y<b.y+b.height&&a.y+a.height>b.y;}
function playerCommand(){return{left:input.isHeld('left'),right:input.isHeld('right'),block:input.isHeld('block'),jump:input.consume('jump'),light:input.consume('light'),heavy:input.consume('heavy'),special:input.consume('special')}}
function reset(){goku.reset();vegeta.reset();cpu.reset();projectiles.length=0;particles.length=0;shake=0;banner='FIGHT!';bannerT=.8;input.clear();running=true;overlay.classList.add('hidden');controlStatus.textContent='Controls ready';}
startBtn.addEventListener('click',reset);restartBtn.addEventListener('click',reset);

function resolveMelee(att,def){const b=att.attackBox();if(!b||att._hitThisAttack)return;if(overlap(b,def.hurtBox())){att._hitThisAttack=true;const blocked=def.receive(att,b.attack);if(!blocked){att.combo++;att.comboT=1;}impact(def.x+def.width/2,def.y+60,att.kind==='goku'?'#66e7ff':'#be65ff');shake=Math.max(shake,b.attack==='heavy'?7:3);}}
function spawnSpecial(f){if(f.attack!=='special'||f.specialSpawned)return;const a=ATTACKS.special;if(f.attackT<a.startup)return;f.specialSpawned=true;projectiles.push({owner:f,x:f.facing>0?f.x+f.width:f.x-34,y:f.y+63,vx:f.facing*(f.kind==='goku'?620:590),life:1.3,r:18,kind:f.kind});}
function updateProjectiles(dt){for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.x+=p.vx*dt;p.life-=dt;const target=p.owner===goku?vegeta:goku;const box={x:p.x-p.r,y:p.y-p.r,width:p.r*2,height:p.r*2};if(overlap(box,target.hurtBox())){const blocked=target.receive(p.owner,'special');if(!blocked){p.owner.combo++;p.owner.comboT=1;}impact(p.x,p.y,p.kind==='goku'?'#65eaff':'#c35cff',28);shake=10;projectiles.splice(i,1);continue;}if(p.life<=0||p.x<-80||p.x>1040)projectiles.splice(i,1);}}
function impact(x,y,color,count=16){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=90+Math.random()*350;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.2+Math.random()*.25,max:.5,size:2+Math.random()*5,color});}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;if(p.life<=0){particles.splice(i,1);continue;}p.vy+=500*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;}}
function bodyPush(a,b){if(!a.onGround||!b.onGround)return;const o=Math.min(a.x+a.width,b.x+b.width)-Math.max(a.x,b.x);if(o<=0)return;const p=o/2+.2;if(a.x<b.x){a.x-=p;b.x+=p}else{a.x+=p;b.x-=p}a.x=Math.max(WORLD.left,Math.min(WORLD.right-a.width,a.x));b.x=Math.max(WORLD.left,Math.min(WORLD.right-b.width,b.x));}

function step(dt){if(!running)return;bannerT=Math.max(0,bannerT-dt);shake=Math.max(0,shake-dt*28);const pc=playerCommand(),vc=cpu.update(dt,vegeta,goku);const oldGA=goku.attack,oldVA=vegeta.attack;goku.update(dt,pc,vegeta);vegeta.update(dt,vc,goku);if(goku.attack!==oldGA)goku._hitThisAttack=false;if(vegeta.attack!==oldVA)vegeta._hitThisAttack=false;bodyPush(goku,vegeta);spawnSpecial(goku);spawnSpecial(vegeta);resolveMelee(goku,vegeta);resolveMelee(vegeta,goku);updateProjectiles(dt);updateParticles(dt);if((goku.health<=0||vegeta.health<=0)&&bannerT<=0){banner=goku.health<=0?'VEGETA WINS':'GOKU WINS';bannerT=999;}}

function drawStage(t){const g=ctx.createLinearGradient(0,0,0,WORLD.height);g.addColorStop(0,'#5e8fd0');g.addColorStop(.54,'#e4a66a');g.addColorStop(1,'#51413b');ctx.fillStyle=g;ctx.fillRect(0,0,WORLD.width,WORLD.height);ctx.fillStyle='rgba(255,240,200,.28)';ctx.beginPath();ctx.arc(780,90,68,0,Math.PI*2);ctx.fill();
  // distant rocky mountains
  poly([[0,340],[110,245],[190,325],[290,205],[385,330],[490,230],[600,335],[710,205],[830,325],[960,235],[960,455],[0,455]],'#765b55');poly([[0,390],[145,310],[255,395],[390,292],[510,398],[660,300],[790,390],[910,310],[960,345],[960,455],[0,455]],'#493c3d');
  ctx.fillStyle='#a67a55';ctx.fillRect(0,WORLD.floorY,WORLD.width,WORLD.height-WORLD.floorY);ctx.fillStyle='#815a3f';for(let i=0;i<24;i++){const x=(i*83+33)%960;ctx.beginPath();ctx.ellipse(x,WORLD.floorY+18+(i%3)*15,18+(i%4)*7,6,0,0,Math.PI*2);ctx.fill();}
}
function drawProjectile(p,t){ctx.save();ctx.shadowBlur=24;ctx.shadowColor=p.kind==='goku'?'#53ddff':'#b64cff';const g=ctx.createRadialGradient(p.x,p.y,2,p.x,p.y,p.r*1.8);g.addColorStop(0,'#fff');g.addColorStop(.35,p.kind==='goku'?'#72ecff':'#ce70ff');g.addColorStop(1,p.kind==='goku'?'rgba(40,150,255,0)':'rgba(130,35,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*1.8,0,Math.PI*2);ctx.fill();ctx.restore();}
function healthBar(x,y,w,h,val,color,reverse=false){ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(x-4,y-4,w+8,h+8);ctx.fillStyle='#24293a';ctx.fillRect(x,y,w,h);const f=w*(Math.max(0,val)/100);ctx.fillStyle=color;ctx.fillRect(reverse?x+w-f:x,y,f,h);ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillRect(x,y,w,4);}
function drawHUD(){healthBar(52,42,360,26,goku.health,'#f88b25');healthBar(548,42,360,26,vegeta.health,'#294dff',true);ctx.fillStyle='#fff';ctx.font='900 21px system-ui';ctx.textAlign='left';ctx.fillText('GOKU',52,34);ctx.textAlign='right';ctx.fillText('VEGETA',908,34);ctx.textAlign='center';ctx.font='900 32px system-ui';ctx.fillText('∞',480,62);if(goku.combo>=2&&goku.comboT>0){ctx.fillStyle='#74ecff';ctx.font='1000 32px system-ui';ctx.fillText(`${goku.combo} HIT`,150,120)}if(vegeta.combo>=2&&vegeta.comboT>0){ctx.fillStyle='#cf75ff';ctx.font='1000 32px system-ui';ctx.fillText(`${vegeta.combo} HIT`,810,120)}if(bannerT>0){ctx.save();ctx.shadowBlur=18;ctx.shadowColor='#75efff';ctx.fillStyle='#fff';ctx.font='1000 54px system-ui';ctx.fillText(banner,480,165);ctx.restore();}}
function drawParticles(){for(const p of particles){ctx.globalAlpha=Math.min(1,p.life/p.max*2);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
function draw(t){ctx.save();ctx.clearRect(0,0,960,540);ctx.translate(shake?(Math.random()-.5)*shake:0,shake?(Math.random()-.5)*shake*.5:0);drawStage(t);goku.draw(t);vegeta.draw(t);for(const p of projectiles)drawProjectile(p,t);drawParticles();drawHUD();ctx.restore();}
function frame(ts){if(!last)last=ts;const delta=Math.min((ts-last)/1000,.08);last=ts;acc+=delta;while(acc>=1/60){step(1/60);acc-=1/60}draw(ts/1000);requestAnimationFrame(frame)}
requestAnimationFrame(frame);
</script>
