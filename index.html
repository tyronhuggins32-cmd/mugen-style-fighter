<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#090b12" />
  <title>Neon Clash — Fighting Prototype</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #070912;
  --panel: #111522;
  --line: rgba(255, 255, 255, 0.14);
  --text: #f7f8ff;
  --muted: #a8aec4;
  --accent: #75f1ff;
  --accent-2: #ff5dd7;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at 15% 0%, rgba(90, 70, 255, 0.2), transparent 34rem),
    linear-gradient(180deg, #0b0d18 0%, var(--bg) 65%);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overscroll-behavior: none;
}

body {
  min-height: 100dvh;
  padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
}

button {
  color: inherit;
  font: inherit;
}

.app-shell {
  width: min(1120px, 100%);
  margin: 0 auto;
}

.topbar {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 10px;
}

h1,
h2,
p {
  margin: 0;
}

h1 {
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  letter-spacing: 0.05em;
  line-height: 0.95;
}

.eyebrow {
  color: var(--accent);
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.18em;
  margin-bottom: 4px;
}

.restart-btn,
.start-card button {
  border: 1px solid rgba(117, 241, 255, 0.5);
  border-radius: 999px;
  background: linear-gradient(180deg, rgba(117, 241, 255, 0.18), rgba(117, 241, 255, 0.06));
  padding: 10px 16px;
  font-weight: 800;
  cursor: pointer;
}

.game-wrap {
  position: relative;
  overflow: hidden;
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #0b1021;
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

.start-overlay {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 18px;
  background: linear-gradient(180deg, rgba(5, 7, 14, 0.46), rgba(5, 7, 14, 0.84));
  backdrop-filter: blur(5px);
  transition: opacity 180ms ease;
}

.start-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.start-card {
  width: min(520px, 100%);
  padding: clamp(20px, 5vw, 36px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 22px;
  background: linear-gradient(145deg, rgba(17, 21, 34, 0.96), rgba(15, 17, 29, 0.86));
  text-align: center;
  box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
}

.start-card h2 {
  font-size: clamp(1.7rem, 8vw, 3rem);
  margin-bottom: 8px;
}

.start-card > p:not(.eyebrow):not(.keyboard-help) {
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 18px;
}

.start-card button {
  min-width: 180px;
  padding-block: 12px;
}

.keyboard-help {
  margin-top: 14px;
  color: #7f879e;
  font-size: 0.76rem;
  line-height: 1.4;
}

.mobile-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 14px 2px 4px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

.controls-cluster {
  display: grid;
  gap: 8px;
}

.dpad {
  grid-template-columns: repeat(3, minmax(56px, 72px));
}

.action-pad {
  grid-template-columns: repeat(2, minmax(56px, 68px));
}

.control {
  min-height: 56px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 16px;
  background: linear-gradient(180deg, #1b2134, #111522);
  box-shadow: inset 0 1px rgba(255, 255, 255, 0.08), 0 6px 14px rgba(0, 0, 0, 0.25);
  font-weight: 900;
  font-size: 1.05rem;
  touch-action: none;
}

.control.active,
.control:active {
  transform: translateY(2px) scale(0.98);
  filter: brightness(1.35);
}

.light { border-color: rgba(117, 241, 255, 0.45); }
.heavy { border-color: rgba(255, 205, 92, 0.55); }
.special { border-color: rgba(255, 93, 215, 0.55); }
.block { border-color: rgba(164, 130, 255, 0.55); }

footer {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 8px 2px 0;
  color: #737b94;
  font-size: 0.72rem;
}

@media (min-width: 900px) {
  .mobile-controls {
    max-width: 760px;
    margin-inline: auto;
  }
}

@media (max-width: 560px) {
  body {
    padding-inline: 8px;
  }

  .topbar {
    align-items: center;
  }

  .restart-btn {
    padding: 8px 11px;
    font-size: 0.75rem;
  }

  .game-wrap {
    border-radius: 12px;
  }

  .mobile-controls {
    gap: 10px;
  }

  .dpad {
    grid-template-columns: repeat(3, minmax(48px, 60px));
  }

  .action-pad {
    grid-template-columns: repeat(2, minmax(48px, 58px));
  }

  .control {
    min-height: 52px;
    border-radius: 14px;
  }

  footer {
    font-size: 0.64rem;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">MUGEN-STYLE ENGINE TEST</p>
        <h1>NEON CLASH</h1>
      </div>
      <button id="restartBtn" class="restart-btn" type="button">Restart Round</button>
    </header>

    <section class="game-wrap" aria-label="Fighting game arena">
      <canvas id="game" width="960" height="540" aria-label="Neon Clash fighting game"></canvas>
      <div id="startOverlay" class="start-overlay">
        <div class="start-card">
          <p class="eyebrow">FIRST PLAYABLE BUILD</p>
          <h2>GOKU VS VEGETA</h2>
          <p>Move, jump, block, combo attacks, and launch a special strike.</p>
          <button id="startBtn" type="button">Tap to Fight</button>
          <p class="keyboard-help">Keyboard: A/D move · W jump · J jab · K heavy · L special · I block</p>
        </div>
      </div>
    </section>

    <section class="mobile-controls" aria-label="Touch controls">
      <div class="dpad controls-cluster">
        <button class="control move" data-action="left" aria-label="Move left">◀</button>
        <button class="control move jump" data-action="jump" aria-label="Jump">▲</button>
        <button class="control move" data-action="right" aria-label="Move right">▶</button>
      </div>

      <div class="action-pad controls-cluster">
        <button class="control attack light" data-action="light" aria-label="Light attack">L</button>
        <button class="control attack heavy" data-action="heavy" aria-label="Heavy attack">H</button>
        <button class="control attack special" data-action="special" aria-label="Special attack">S</button>
        <button class="control attack block" data-action="block" aria-label="Block">B</button>
      </div>
    </section>

    <footer>
      <span>Prototype v0.1</span>
      <span>60 FPS fixed-step combat</span>
    </footer>
  </main>

  <script>
// ===== config.js =====
const WORLD = Object.freeze({
  width: 960,
  height: 540,
  floorY: 455,
  gravity: 2500,
  leftWall: 42,
  rightWall: 918,
});

const ATTACKS = Object.freeze({
  light: {
    startup: 4,
    active: 4,
    recovery: 10,
    damage: 6,
    hitstun: 15,
    blockstun: 8,
    knockbackX: 250,
    knockbackY: -90,
    range: 54,
    height: 58,
    yOffset: 27,
    shake: 2,
  },
  heavy: {
    startup: 10,
    active: 5,
    recovery: 18,
    damage: 13,
    hitstun: 23,
    blockstun: 13,
    knockbackX: 470,
    knockbackY: -220,
    range: 78,
    height: 68,
    yOffset: 20,
    shake: 5,
  },
  special: {
    startup: 16,
    active: 8,
    recovery: 27,
    damage: 20,
    hitstun: 30,
    blockstun: 17,
    knockbackX: 650,
    knockbackY: -330,
    range: 126,
    height: 84,
    yOffset: 10,
    shake: 9,
  },
});

const FIGHTER_DATA = Object.freeze({
  julian: {
    name: "GOKU",
    body: "#f28c28",
    accent: "#ffe6c7",
    glow: "#ffb347",
    speed: 315,
    jumpSpeed: 930,
  },
  rift: {
    name: "VEGETA",
    body: "#244dff",
    accent: "#e7ecff",
    glow: "#7aa2ff",
    speed: 282,
    jumpSpeed: 875,
  },
});

// ===== input.js =====
const KEY_MAP = Object.freeze({
  KeyA: "left",
  ArrowLeft: "left",
  KeyD: "right",
  ArrowRight: "right",
  KeyW: "jump",
  ArrowUp: "jump",
  KeyJ: "light",
  KeyK: "heavy",
  KeyL: "special",
  KeyI: "block",
  ShiftLeft: "block",
});

class InputManager {
  constructor(root = document) {
    this.held = new Set();
    this.pressed = new Set();
    this.pointerActions = new Map();

    window.addEventListener("keydown", (event) => {
      const action = KEY_MAP[event.code];
      if (!action) return;
      event.preventDefault();
      if (!this.held.has(action)) this.pressed.add(action);
      this.held.add(action);
    }, { passive: false });

    window.addEventListener("keyup", (event) => {
      const action = KEY_MAP[event.code];
      if (!action) return;
      event.preventDefault();
      this.held.delete(action);
    }, { passive: false });

    root.querySelectorAll("[data-action]").forEach((button) => {
      const action = button.dataset.action;

      const press = (event) => {
        event.preventDefault();
        button.setPointerCapture?.(event.pointerId);
        this.pointerActions.set(event.pointerId, action);
        if (!this.held.has(action)) this.pressed.add(action);
        this.held.add(action);
        button.classList.add("active");
      };

      const release = (event) => {
        event.preventDefault();
        const released = this.pointerActions.get(event.pointerId);
        this.pointerActions.delete(event.pointerId);
        if (released && ![...this.pointerActions.values()].includes(released)) {
          this.held.delete(released);
        }
        button.classList.remove("active");
      };

      button.addEventListener("pointerdown", press, { passive: false });
      button.addEventListener("pointerup", release, { passive: false });
      button.addEventListener("pointercancel", release, { passive: false });
      button.addEventListener("contextmenu", (event) => event.preventDefault());
    });

    window.addEventListener("blur", () => this.clear());
  }

  isHeld(action) {
    return this.held.has(action);
  }

  consumePress(action) {
    const hasPress = this.pressed.has(action);
    this.pressed.delete(action);
    return hasPress;
  }

  endFrame() {
    this.pressed.clear();
  }

  clear() {
    this.held.clear();
    this.pressed.clear();
    this.pointerActions.clear();
    document.querySelectorAll("[data-action].active").forEach((element) => {
      element.classList.remove("active");
    });
  }
}

// ===== ai.js =====
class CPUController {
  constructor() {
    this.thinkTimer = 0;
    this.intent = {};
    this.cooldown = 0;
  }

  reset() {
    this.thinkTimer = 0;
    this.cooldown = 0;
    this.intent = {};
  }

  update(dt, self, opponent) {
    this.thinkTimer -= dt;
    this.cooldown = Math.max(0, this.cooldown - dt);

    if (this.thinkTimer <= 0) {
      this.thinkTimer = 0.09 + Math.random() * 0.1;
      this.intent = this.chooseIntent(self, opponent);
    }

    return this.intent;
  }

  chooseIntent(self, opponent) {
    if (self.state === "ko") return {};

    const dx = opponent.x - self.x;
    const distance = Math.abs(dx);
    const toward = dx > 0 ? "right" : "left";
    const away = dx > 0 ? "left" : "right";
    const intent = {};

    if (self.hitstun > 0 || self.blockstun > 0) return intent;

    if (opponent.attackName && distance < 135 && Math.random() < 0.72) {
      intent.block = true;
      if (Math.random() < 0.16) intent[away] = true;
      return intent;
    }

    if (distance > 170) {
      intent[toward] = true;
      if (distance > 360 && self.onGround && Math.random() < 0.12) intent.jump = true;
      return intent;
    }

    if (distance < 70 && Math.random() < 0.18) {
      intent[away] = true;
      return intent;
    }

    if (self.canAct() && this.cooldown <= 0) {
      const roll = Math.random();
      if (distance < 82 && roll < 0.5) {
        intent.light = true;
        this.cooldown = 0.18;
      } else if (distance < 105 && roll < 0.82) {
        intent.heavy = true;
        this.cooldown = 0.5;
      } else if (distance < 150) {
        intent.special = true;
        this.cooldown = 0.9;
      } else {
        intent[toward] = true;
      }
    }

    return intent;
  }
}

// ===== fighter.js =====

const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

class Fighter {
  constructor({ x, data, isCpu = false }) {
    this.data = data;
    this.isCpu = isCpu;
    this.startX = x;
    this.width = 48;
    this.height = 118;
    this.reset(x);
  }

  reset(x = this.startX) {
    this.x = x;
    this.y = WORLD.floorY - this.height;
    this.vx = 0;
    this.vy = 0;
    this.health = 100;
    this.facing = this.isCpu ? -1 : 1;
    this.state = "idle";
    this.stateFrame = 0;
    this.attackName = null;
    this.attackConnected = false;
    this.hitstop = 0;
    this.hitstun = 0;
    this.blockstun = 0;
    this.combo = 0;
    this.comboTimer = 0;
    this.onGround = true;
    this.blocking = false;
    this.flash = 0;
  }

  canAct() {
    return this.state !== "ko" && this.hitstun <= 0 && this.blockstun <= 0 && !this.attackName;
  }

  startAttack(name) {
    if (!this.canAct() || !ATTACKS[name]) return false;
    this.attackName = name;
    this.attackConnected = false;
    this.state = `attack-${name}`;
    this.stateFrame = 0;
    this.vx *= 0.25;
    return true;
  }

  jump() {
    if (!this.canAct() || !this.onGround) return;
    this.vy = -this.data.jumpSpeed;
    this.onGround = false;
    this.state = "jump";
    this.stateFrame = 0;
  }

  update(dt, command, opponent) {
    if (this.hitstop > 0) {
      this.hitstop -= 1;
      return;
    }

    this.stateFrame += 1;
    this.flash = Math.max(0, this.flash - dt * 8);
    this.comboTimer = Math.max(0, this.comboTimer - dt);
    if (this.comboTimer === 0) this.combo = 0;

    if (this.hitstun > 0) {
      this.hitstun -= 1;
      this.state = this.health <= 0 ? "ko" : "hit";
    } else if (this.blockstun > 0) {
      this.blockstun -= 1;
      this.state = "block";
    } else if (this.state !== "ko") {
      this.blocking = Boolean(command.block && this.onGround && !this.attackName);

      if (this.attackName) {
        this.updateAttack();
      } else {
        this.handleCommand(command);
      }
    }

    if (!this.onGround) {
      this.vy += WORLD.gravity * dt;
      if (this.vy > 0 && !this.attackName && this.hitstun <= 0) this.state = "fall";
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    const groundY = WORLD.floorY - this.height;
    if (this.y >= groundY) {
      this.y = groundY;
      this.vy = 0;
      this.onGround = true;
      if (this.state === "jump" || this.state === "fall") this.state = "idle";
    } else {
      this.onGround = false;
    }

    if (this.onGround && this.hitstun <= 0 && this.blockstun <= 0 && this.state !== "ko") {
      this.vx *= Math.pow(0.0003, dt);
    } else {
      this.vx *= Math.pow(0.04, dt);
    }

    this.x = clamp(this.x, WORLD.leftWall, WORLD.rightWall - this.width);

    if (this.state !== "ko" && !this.attackName && this.hitstun <= 0 && this.blockstun <= 0) {
      const center = this.x + this.width / 2;
      const opponentCenter = opponent.x + opponent.width / 2;
      this.facing = opponentCenter >= center ? 1 : -1;
    }
  }

  handleCommand(command) {
    if (command.jump) this.jump();
    if (command.light && this.startAttack("light")) return;
    if (command.heavy && this.startAttack("heavy")) return;
    if (command.special && this.startAttack("special")) return;

    if (this.blocking) {
      this.state = "block";
      this.vx = 0;
      return;
    }

    const direction = Number(command.right) - Number(command.left);
    if (direction !== 0 && this.onGround) {
      this.vx = direction * this.data.speed;
      this.state = "walk";
    } else if (this.onGround) {
      this.state = "idle";
    }
  }

  updateAttack() {
    const attack = ATTACKS[this.attackName];
    const total = attack.startup + attack.active + attack.recovery;

    if (this.attackName === "special" && this.stateFrame >= attack.startup - 5 && this.stateFrame < attack.startup + attack.active) {
      this.vx = this.facing * 230;
    }

    if (this.stateFrame >= total) {
      this.attackName = null;
      this.attackConnected = false;
      this.state = this.onGround ? "idle" : "fall";
      this.stateFrame = 0;
    }
  }

  getAttackBox() {
    if (!this.attackName || this.attackConnected) return null;
    const attack = ATTACKS[this.attackName];
    const activeStart = attack.startup;
    const activeEnd = attack.startup + attack.active;
    if (this.stateFrame < activeStart || this.stateFrame >= activeEnd) return null;

    return {
      x: this.facing > 0 ? this.x + this.width - 4 : this.x - attack.range + 4,
      y: this.y + attack.yOffset,
      width: attack.range,
      height: attack.height,
      attack,
    };
  }

  getHurtBox() {
    return {
      x: this.x + 7,
      y: this.y + 3,
      width: this.width - 14,
      height: this.height - 3,
    };
  }

  receiveHit(attacker, attack) {
    const attackerCenter = attacker.x + attacker.width / 2;
    const myCenter = this.x + this.width / 2;
    const attackerIsInFront = (attackerCenter - myCenter) * this.facing > 0;
    const blocked = this.blocking && attackerIsInFront && this.onGround;

    if (blocked) {
      const chip = Math.max(1, Math.round(attack.damage * 0.12));
      this.health = Math.max(0, this.health - chip);
      this.blockstun = attack.blockstun;
      this.state = "block";
      this.vx = attacker.facing * attack.knockbackX * 0.28;
      this.hitstop = 3;
      attacker.hitstop = 3;
      return { blocked: true, damage: chip };
    }

    this.health = Math.max(0, this.health - attack.damage);
    this.hitstun = attack.hitstun;
    this.state = this.health <= 0 ? "ko" : "hit";
    this.vx = attacker.facing * attack.knockbackX;
    this.vy = attack.knockbackY;
    if (attack.knockbackY < 0) this.onGround = false;
    this.flash = 1;
    this.hitstop = this.health <= 0 ? 10 : 5;
    attacker.hitstop = this.health <= 0 ? 10 : 5;
    return { blocked: false, damage: attack.damage };
  }

  draw(ctx, time) {
    const cx = this.x + this.width / 2;
    const baseY = this.y + this.height;
    const bob = this.state === "idle" ? Math.sin(time * 5 + this.x) * 2 : 0;
    const walkSwing = this.state === "walk" ? Math.sin(this.stateFrame * 0.45) * 0.7 : 0;
    const hitLean = this.state === "hit" ? -this.facing * 0.28 : 0;
    const blockLean = this.state === "block" ? -this.facing * 0.1 : 0;
    const attackProgress = this.getAttackProgress();

    ctx.save();
    ctx.translate(cx, baseY + bob);
    ctx.scale(this.facing, 1);
    ctx.rotate(hitLean + blockLean);

    if (this.attackName === "special") {
      const aura = 18 + Math.sin(time * 18) * 5 + attackProgress * 25;
      const gradient = ctx.createRadialGradient(12, -65, 4, 12, -65, aura);
      gradient.addColorStop(0, `${this.data.glow}aa`);
      gradient.addColorStop(1, `${this.data.glow}00`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(12, -65, aura, 0, Math.PI * 2);
      ctx.fill();
    }

    const pose = this.pose(walkSwing, attackProgress);
    const bodyColor = this.flash > 0 ? "#ffffff" : this.data.body;

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = bodyColor;

    // Back limbs first.
    this.drawLimb(ctx, pose.backShoulder, pose.backHand, 12, bodyColor, 0.65);
    this.drawLimb(ctx, pose.backHip, pose.backFoot, 14, bodyColor, 0.68);

    // Torso overlaps every limb connection so the model always reads as one connected body.
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(-18, -91, 36, 57, 13);
    ctx.fill();

    ctx.fillStyle = this.data.accent;
    ctx.beginPath();
    ctx.roundRect(-10, -83, 20, 8, 4);
    ctx.fill();

    // Front limbs.
    this.drawLimb(ctx, pose.frontHip, pose.frontFoot, 15, bodyColor, 1);
    this.drawLimb(ctx, pose.frontShoulder, pose.frontHand, 13, bodyColor, 1);

    // Head joins the torso at the neck.
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(-7, -101, 14, 18, 5);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -111, 17, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = this.data.accent;
    ctx.fillRect(5, -116, 7, 3);

    if (this.state === "ko") {
      ctx.globalAlpha = 0.35;
    }

    ctx.restore();
  }

  drawLimb(ctx, start, end, width, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(start[0], start[1]);
    ctx.lineTo((start[0] + end[0]) * 0.55, (start[1] + end[1]) * 0.55 + 2);
    ctx.lineTo(end[0], end[1]);
    ctx.stroke();
    ctx.restore();
  }

  getAttackProgress() {
    if (!this.attackName) return 0;
    const attack = ATTACKS[this.attackName];
    const total = attack.startup + attack.active + attack.recovery;
    return clamp(this.stateFrame / total, 0, 1);
  }

  pose(walkSwing, attackProgress) {
    const pose = {
      frontShoulder: [10, -82],
      frontHand: [28, -54],
      backShoulder: [-10, -82],
      backHand: [-22, -54],
      frontHip: [9, -38],
      frontFoot: [16 + walkSwing * 16, -2],
      backHip: [-9, -38],
      backFoot: [-14 - walkSwing * 16, -2],
    };

    if (this.state === "jump" || this.state === "fall") {
      pose.frontFoot = [22, -18];
      pose.backFoot = [-18, -10];
      pose.frontHand = [20, -72];
      pose.backHand = [-20, -67];
    }

    if (this.state === "block") {
      pose.frontHand = [20, -94];
      pose.backHand = [20, -72];
      pose.frontFoot = [17, -2];
      pose.backFoot = [-18, -2];
    }

    if (this.attackName === "light") {
      const extend = Math.sin(Math.min(1, attackProgress * 2.3) * Math.PI);
      pose.frontHand = [28 + 45 * extend, -73];
    }

    if (this.attackName === "heavy") {
      const extend = Math.sin(Math.min(1, attackProgress * 2) * Math.PI);
      pose.frontHand = [24 + 66 * extend, -56 - 20 * extend];
      pose.backHand = [-12, -92];
    }

    if (this.attackName === "special") {
      const extend = Math.sin(Math.min(1, attackProgress * 1.7) * Math.PI);
      pose.frontHand = [26 + 90 * extend, -70];
      pose.backHand = [14 + 55 * extend, -55];
      pose.frontFoot = [27, -2];
      pose.backFoot = [-24, -2];
    }

    return pose;
  }
}

function boxesOverlap(a, b) {
  return a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y;
}

// ===== game.js =====

const canvas = document.querySelector("#game");
const ctx = canvas.getContext("2d", { alpha: false });
const startOverlay = document.querySelector("#startOverlay");
const startButton = document.querySelector("#startBtn");
const restartButton = document.querySelector("#restartBtn");

const input = new InputManager(document);
const cpu = new CPUController();
const player = new Fighter({ x: 190, data: FIGHTER_DATA.julian });
const enemy = new Fighter({ x: 720, data: FIGHTER_DATA.rift, isCpu: true });
const fighters = [player, enemy];

let running = false;
let roundOverTimer = 0;
let lastTime = 0;
let accumulator = 0;
let cameraShake = 0;
let hitBanner = "";
let hitBannerTimer = 0;
const particles = [];
const FIXED_DT = 1 / 60;

function resizeBackingStore() {
  const ratio = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  const width = Math.max(1, Math.round(rect.width * ratio));
  const height = Math.max(1, Math.round(rect.height * ratio));
  if (canvas.width !== width || canvas.height !== height) {
    canvas.width = width;
    canvas.height = height;
  }
}

function playerCommand() {
  return {
    left: input.isHeld("left"),
    right: input.isHeld("right"),
    block: input.isHeld("block"),
    jump: input.consumePress("jump"),
    light: input.consumePress("light"),
    heavy: input.consumePress("heavy"),
    special: input.consumePress("special"),
  };
}

function resetRound() {
  player.reset(190);
  enemy.reset(720);
  cpu.reset();
  particles.length = 0;
  roundOverTimer = 0;
  cameraShake = 0;
  hitBanner = "FIGHT";
  hitBannerTimer = 0.65;
  input.clear();
}

function startGame() {
  resetRound();
  running = true;
  startOverlay.classList.add("hidden");
}

startButton.addEventListener("click", startGame);
restartButton.addEventListener("click", startGame);

function step(dt) {
  if (!running) return;

  hitBannerTimer = Math.max(0, hitBannerTimer - dt);
  cameraShake = Math.max(0, cameraShake - dt * 30);

  const pCommand = playerCommand();
  const eCommand = cpu.update(dt, enemy, player);

  player.update(dt, pCommand, enemy);
  enemy.update(dt, eCommand, player);

  resolveBodyCollision(player, enemy);
  resolveAttack(player, enemy);
  resolveAttack(enemy, player);
  updateParticles(dt);

  const ko = player.health <= 0 || enemy.health <= 0;
  if (ko) {
    roundOverTimer += dt;
    if (roundOverTimer > 0.2 && hitBannerTimer <= 0) {
      hitBanner = player.health <= 0 ? "VEGETA WINS" : "GOKU WINS";
      hitBannerTimer = 999;
    }
  }
}

function resolveBodyCollision(a, b) {
  if (!a.onGround || !b.onGround) return;
  const overlap = Math.min(a.x + a.width, b.x + b.width) - Math.max(a.x, b.x);
  if (overlap <= 0) return;

  const push = overlap / 2 + 0.1;
  if (a.x < b.x) {
    a.x -= push;
    b.x += push;
  } else {
    a.x += push;
    b.x -= push;
  }
}

function resolveAttack(attacker, defender) {
  const hitbox = attacker.getAttackBox();
  if (!hitbox || !boxesOverlap(hitbox, defender.getHurtBox())) return;

  attacker.attackConnected = true;
  const result = defender.receiveHit(attacker, hitbox.attack);

  if (!result.blocked) {
    attacker.combo += 1;
    attacker.comboTimer = 1.1;
  }

  const hitX = defender.x + defender.width / 2;
  const hitY = defender.y + defender.height * 0.44;
  spawnHitParticles(hitX, hitY, result.blocked ? 8 : 18, result.blocked ? "#bba9ff" : attacker.data.glow);
  cameraShake = Math.max(cameraShake, hitbox.attack.shake);
}

function spawnHitParticles(x, y, count, color) {
  for (let i = 0; i < count; i += 1) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 90 + Math.random() * 430;
    particles.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.18 + Math.random() * 0.25,
      maxLife: 0.45,
      color,
      size: 2 + Math.random() * 5,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i -= 1) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    p.vy += 620 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
}

function draw(timestamp) {
  resizeBackingStore();
  const scaleX = canvas.width / WORLD.width;
  const scaleY = canvas.height / WORLD.height;

  ctx.save();
  ctx.scale(scaleX, scaleY);

  const shakeX = cameraShake > 0 ? (Math.random() - 0.5) * cameraShake : 0;
  const shakeY = cameraShake > 0 ? (Math.random() - 0.5) * cameraShake * 0.55 : 0;
  ctx.translate(shakeX, shakeY);

  drawStage(timestamp / 1000);
  fighters.sort((a, b) => a.y - b.y).forEach((fighter) => fighter.draw(ctx, timestamp / 1000));
  drawParticles();
  drawHud();

  ctx.restore();
}

function drawStage(time) {
  const sky = ctx.createLinearGradient(0, 0, 0, WORLD.height);
  sky.addColorStop(0, "#111a38");
  sky.addColorStop(0.58, "#201538");
  sky.addColorStop(1, "#0a0c16");
  ctx.fillStyle = sky;
  ctx.fillRect(-20, -20, WORLD.width + 40, WORLD.height + 40);

  ctx.fillStyle = "rgba(106, 238, 255, 0.12)";
  for (let i = 0; i < 16; i += 1) {
    const x = i * 74 + Math.sin(time * 0.3 + i) * 5;
    const h = 120 + ((i * 47) % 150);
    ctx.fillRect(x, WORLD.floorY - h, 44, h);
  }

  ctx.strokeStyle = "rgba(117, 241, 255, 0.15)";
  ctx.lineWidth = 2;
  for (let i = 0; i < 12; i += 1) {
    const y = WORLD.floorY + 8 + i * 13;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(WORLD.width, y);
    ctx.stroke();
  }

  ctx.fillStyle = "#0a0c15";
  ctx.fillRect(0, WORLD.floorY, WORLD.width, WORLD.height - WORLD.floorY);
  ctx.fillStyle = "rgba(255, 93, 215, 0.5)";
  ctx.fillRect(0, WORLD.floorY, WORLD.width, 3);

  const glow = 0.4 + Math.sin(time * 3) * 0.1;
  ctx.fillStyle = `rgba(117, 241, 255, ${glow})`;
  ctx.font = "800 22px system-ui";
  ctx.textAlign = "center";
  ctx.fillText("ROCKY BATTLEFIELD // STAGE 01", WORLD.width / 2, 420);
}

function drawHud() {
  drawHealthBar(52, 42, 360, 26, player.health, player.data.body, false);
  drawHealthBar(WORLD.width - 52 - 360, 42, 360, 26, enemy.health, enemy.data.body, true);

  ctx.font = "900 21px system-ui";
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "left";
  ctx.fillText(player.data.name, 52, 34);
  ctx.textAlign = "right";
  ctx.fillText(enemy.data.name, WORLD.width - 52, 34);

  ctx.textAlign = "center";
  ctx.font = "900 34px system-ui";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("∞", WORLD.width / 2, 62);

  if (player.combo >= 2 && player.comboTimer > 0) drawCombo(150, 118, player.combo, player.data.glow);
  if (enemy.combo >= 2 && enemy.comboTimer > 0) drawCombo(WORLD.width - 150, 118, enemy.combo, enemy.data.glow);

  if (hitBannerTimer > 0) {
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = "1000 54px system-ui";
    ctx.shadowColor = "rgba(117, 241, 255, 0.8)";
    ctx.shadowBlur = 18;
    ctx.fillStyle = "#ffffff";
    ctx.fillText(hitBanner, WORLD.width / 2, 170);
    ctx.restore();
  }
}

function drawHealthBar(x, y, width, height, health, color, reverse) {
  ctx.fillStyle = "rgba(0, 0, 0, 0.52)";
  ctx.fillRect(x - 4, y - 4, width + 8, height + 8);
  ctx.fillStyle = "#252838";
  ctx.fillRect(x, y, width, height);
  const fillWidth = width * (health / 100);
  ctx.fillStyle = color;
  ctx.fillRect(reverse ? x + width - fillWidth : x, y, fillWidth, height);
  ctx.fillStyle = "rgba(255,255,255,0.25)";
  ctx.fillRect(x, y, width, 4);
}

function drawCombo(x, y, combo, color) {
  ctx.save();
  ctx.textAlign = "center";
  ctx.fillStyle = color;
  ctx.font = "1000 34px system-ui";
  ctx.fillText(`${combo} HIT`, x, y);
  ctx.fillStyle = "#ffffff";
  ctx.font = "800 13px system-ui";
  ctx.fillText("COMBO", x, y + 18);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife * 2);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function frame(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let frameTime = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  accumulator += frameTime;

  while (accumulator >= FIXED_DT) {
    step(FIXED_DT);
    accumulator -= FIXED_DT;
  }

  draw(timestamp);
  requestAnimationFrame(frame);
}

window.addEventListener("resize", resizeBackingStore);
requestAnimationFrame(frame);
</script>
</body>
