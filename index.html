<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#070912">
<title>Saiyan Clash v0.4</title>
<style>
:root{color-scheme:dark;--bg:#070912;--panel:#111522;--line:rgba(255,255,255,.16);--text:#f7f8ff;--muted:#8992ad;--cyan:#75ecff;--violet:#b56cff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 18% 0%,rgba(73,64,210,.25),transparent 34rem),linear-gradient(#0b0e1a,#070912 70%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
body{min-height:100dvh;padding:max(10px,env(safe-area-inset-top)) max(7px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(7px,env(safe-area-inset-left))}
button{font:inherit;color:inherit}.app{width:min(1120px,100%);margin:auto}.topbar{display:flex;align-items:end;justify-content:space-between;gap:10px;margin-bottom:9px}.eyebrow{margin:0 0 3px;color:var(--cyan);font-weight:1000;font-size:.64rem;letter-spacing:.18em}.title{margin:0;font-size:clamp(1.55rem,6vw,2.8rem);line-height:.95;letter-spacing:.04em}.restart{border:1px solid rgba(117,236,255,.55);border-radius:999px;background:linear-gradient(rgba(117,236,255,.18),rgba(117,236,255,.05));padding:9px 14px;font-weight:900;white-space:nowrap}
.game-wrap{position:relative;overflow:hidden;width:100%;aspect-ratio:16/9;border:1px solid var(--line);border-radius:16px;background:#0d1222;box-shadow:0 22px 65px rgba(0,0,0,.5)}canvas{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated}.start-overlay{position:absolute;inset:0;display:grid;place-items:center;padding:16px;background:linear-gradient(rgba(4,6,12,.38),rgba(4,6,12,.88));backdrop-filter:blur(4px);transition:opacity .18s}.start-overlay.hidden{opacity:0;pointer-events:none}.start-card{width:min(560px,100%);padding:23px;border:1px solid rgba(255,255,255,.19);border-radius:20px;background:linear-gradient(145deg,rgba(18,22,38,.98),rgba(10,12,24,.92));text-align:center}.start-card h2{margin:0 0 7px;font-size:clamp(1.7rem,8vw,3.2rem)}.start-card p{margin:0 0 14px;color:#adb5ca;line-height:1.42}.start-card button{min-width:185px;border:1px solid rgba(117,236,255,.58);border-radius:999px;background:linear-gradient(rgba(117,236,255,.23),rgba(117,236,255,.07));padding:12px 17px;font-weight:1000}
.controls{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 1px 3px;touch-action:none;user-select:none;-webkit-user-select:none}.cluster{display:grid;gap:6px}.dpad{grid-template-columns:repeat(3,minmax(44px,63px));grid-template-areas:"blank up blank2" "left down right"}.actions{grid-template-columns:repeat(3,minmax(42px,59px));grid-template-rows:repeat(2,54px)}.control{min-height:50px;border:1px solid rgba(255,255,255,.2);border-radius:15px;background:linear-gradient(#1c2338,#111522);font-weight:1000;font-size:.94rem;box-shadow:inset 0 1px rgba(255,255,255,.08),0 6px 15px rgba(0,0,0,.26);touch-action:none;padding:0}.control.active,.control:active{transform:translateY(2px) scale(.97);filter:brightness(1.38)}.up{grid-area:up}.left{grid-area:left}.down{grid-area:down}.right{grid-area:right}.punch{border-color:rgba(117,236,255,.58)}.kick{border-color:rgba(255,199,83,.64)}.ki{border-color:rgba(80,163,255,.68)}.special{border-color:rgba(198,96,255,.68)}.dash{border-color:rgba(101,255,176,.62)}.block{border-color:rgba(255,111,137,.62)}
.legend{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:5px;color:#78819c;font-size:.54rem;text-align:center}.statusbar{display:flex;justify-content:space-between;gap:10px;padding:7px 2px 0;color:#78819c;font-size:.68rem}
@media(max-width:560px){.restart{padding:8px 10px;font-size:.73rem}.game-wrap{border-radius:11px}.controls{gap:7px}.dpad{grid-template-columns:repeat(3,minmax(42px,54px))}.actions{grid-template-columns:repeat(3,minmax(40px,52px));grid-template-rows:repeat(2,50px)}.control{min-height:48px;border-radius:13px;font-size:.86rem}.statusbar{font-size:.59rem}.legend{font-size:.48rem}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div><p class="eyebrow">MUGEN-STYLE FAN ENGINE</p><h1 class="title">SAIYAN CLASH</h1></div><button id="restartBtn" class="restart" type="button">Restart</button></header>
<section class="game-wrap" aria-label="Fighting game arena"><canvas id="game" width="960" height="540"></canvas><div id="startOverlay" class="start-overlay"><div class="start-card"><p class="eyebrow">GOKU SPRITE TEST v0.4</p><h2>GOKU VS VEGETA</h2><p>Goku now uses the uploaded pixel-art model directly. Vegeta remains temporary while we build characters one at a time.</p><button id="startBtn" type="button">Tap to Fight</button></div></div></section>
<section class="controls" aria-label="Touch controls">
  <div class="cluster dpad">
    <button class="control up" data-action="jump" type="button" aria-label="Jump">▲</button>
    <button class="control left" data-action="left" type="button" aria-label="Move left">◀</button>
    <button class="control down" data-action="down" type="button" aria-label="Crouch">▼</button>
    <button class="control right" data-action="right" type="button" aria-label="Move right">▶</button>
  </div>
  <div>
    <div class="cluster actions">
      <button class="control punch" data-action="punch" type="button">P</button>
      <button class="control kick" data-action="kick" type="button">K</button>
      <button class="control ki" data-action="ki" type="button">KI</button>
      <button class="control special" data-action="special" type="button">SP</button>
      <button class="control dash" data-action="dash" type="button">D</button>
      <button class="control block" data-action="block" type="button">B</button>
    </div>
    <div class="legend"><span>Punch</span><span>Kick</span><span>Blast</span><span>Beam</span><span>Dash</span><span>Block</span></div>
  </div>
</section>
<footer class="statusbar"><span id="controlStatus">Controls ready</span><span>Fixed 60 FPS · v0.3</span></footer>
</main>

class InputManager{
 constructor(){this.held=new Set();this.pressed=new Set();this.pointerMap=new Map();this.bindKeyboard();this.bindButtons();}
 press(a){if(['left','right','down','block'].includes(a))this.held.add(a);else this.pressed.add(a);controlStatus.textContent=`Input: ${a.toUpperCase()}`;}
 release(a){this.held.delete(a);}
 consume(a){const yes=this.pressed.has(a);this.pressed.delete(a);return yes;}
 heldNow(a){return this.held.has(a);}
 clear(){this.held.clear();this.pressed.clear();this.pointerMap.clear();document.querySelectorAll('.control.active').forEach(b=>b.classList.remove('active'));}
 bindKeyboard(){const map={ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',ArrowDown:'down',KeyS:'down',ArrowUp:'jump',KeyW:'jump',KeyJ:'punch',KeyK:'kick',KeyU:'ki',KeyL:'special',Space:'dash',KeyI:'block',ShiftLeft:'block'};addEventListener('keydown',e=>{const a=map[e.code];if(!a)return;e.preventDefault();if(!e.repeat)this.press(a);});addEventListener('keyup',e=>{const a=map[e.code];if(!a)return;e.preventDefault();this.release(a);});addEventListener('blur',()=>this.clear());}
 bindButtons(){document.querySelectorAll('[data-action]').forEach(btn=>{const a=btn.dataset.action;const begin=e=>{e.preventDefault();const id=e.pointerId??0;this.pointerMap.set(id,a);this.press(a);btn.classList.add('active');try{btn.setPointerCapture?.(id)}catch{}};const end=e=>{e.preventDefault();const id=e.pointerId??0,action=this.pointerMap.get(id)||a;this.pointerMap.delete(id);if(![...this.pointerMap.values()].includes(action))this.release(action);btn.classList.remove('active');};btn.addEventListener('pointerdown',begin,{passive:false});btn.addEventListener('pointerup',end,{passive:false});btn.addEventListener('pointercancel',end,{passive:false});btn.addEventListener('lostpointercapture',end,{passive:false});btn.addEventListener('contextmenu',e=>e.preventDefault());});}
}
class Fighter{
 constructor(kind,x,cpu=false){this.kind=kind;this.isCPU=cpu;this.width=70;this.height=174;this.startX=x;this.reset();}
 reset(){this.x=this.startX;this.y=WORLD.floorY-this.height;this.vx=0;this.vy=0;this.health=100;this.energy=50;this.facing=this.isCPU?-1:1;this.onGround=true;this.state='idle';this.move=null;this.moveT=0;this.spawned=false;this.hitOnce=false;this.hitstun=0;this.blockstun=0;this.blocking=false;this.crouching=false;this.flash=0;this.combo=0;this.comboT=0;this.dashT=0;this.animT=0;}
 canAct(){return this.health>0&&this.hitstun<=0&&this.blockstun<=0&&!this.move&&this.dashT<=0;}
 tryMove(name){const m=MOVES[name];if(!this.canAct()||this.energy<m.cost)return false;this.energy-=m.cost;this.move=name;this.moveT=0;this.spawned=false;this.hitOnce=false;this.state=name;this.vx*=.18;return true;}
 command(c){if(this.health<=0||this.hitstun>0||this.blockstun>0)return;this.blocking=Boolean(c.block&&this.onGround&&!this.move&&this.dashT<=0);this.crouching=Boolean(c.down&&this.onGround&&!this.move&&this.dashT<=0&&!this.blocking);if(this.move||this.dashT>0)return;if(c.jump&&this.onGround&&!this.crouching&&!this.blocking){this.vy=-900;this.onGround=false;this.state='jump';return;}if(c.punch&&this.tryMove('punch'))return;if(c.kick&&this.tryMove('kick'))return;if(c.ki&&this.tryMove('ki'))return;if(c.special){if(!this.tryMove('special'))controlStatus.textContent='Need 35 KI for SP';return;}if(c.dash&&this.onGround&&!this.crouching&&!this.blocking){this.dashT=.22;this.vx=this.facing*690;this.state='dash';return;}if(this.blocking){this.vx=0;this.state='block';return;}if(this.crouching){this.vx=0;this.state='crouch';return;}const d=(c.right?1:0)-(c.left?1:0);if(d&&this.onGround){this.vx=d*(this.kind==='goku'?320:300);this.state='walk';}else if(this.onGround)this.state='idle';}
 update(dt,c,opp){this.animT+=dt;this.flash=Math.max(0,this.flash-dt*7);this.comboT=Math.max(0,this.comboT-dt);if(this.comboT<=0)this.combo=0;this.energy=clamp(this.energy+dt*5.5,0,100);if(this.hitstun>0){this.hitstun=Math.max(0,this.hitstun-dt);this.state=this.health<=0?'ko':'hit';}else if(this.blockstun>0){this.blockstun=Math.max(0,this.blockstun-dt);this.state='block';}this.command(c);if(this.dashT>0){this.dashT=Math.max(0,this.dashT-dt);this.state='dash';if(this.dashT<=0)this.state=this.onGround?'idle':'fall';}if(this.move){this.moveT+=dt;const m=MOVES[this.move];if(this.moveT>=m.startup+m.active+m.recovery){this.move=null;this.moveT=0;this.state=this.onGround?'idle':'fall';}}
  if(!this.onGround){this.vy+=WORLD.gravity*dt;if(this.vy>0&&!this.move)this.state='fall';}this.x+=this.vx*dt;this.y+=this.vy*dt;const ground=WORLD.floorY-this.height;if(this.y>=ground){this.y=ground;this.vy=0;this.onGround=true;if(['jump','fall'].includes(this.state))this.state='idle';}else this.onGround=false;this.vx*=Math.pow(this.onGround ? 0.00055 : 0.07,dt);this.x=clamp(this.x,WORLD.left,WORLD.right-this.width);if(!this.move&&this.hitstun<=0&&this.blockstun<=0&&this.health>0&&this.dashT<=0)this.facing=(opp.x+opp.width/2)>=this.x+this.width/2?1:-1;}
 meleeBox(){if(!['punch','kick'].includes(this.move)||this.hitOnce)return null;const m=MOVES[this.move];if(this.moveT<m.startup||this.moveT>m.startup+m.active)return null;return{x:this.facing>0?this.x+this.width-8:this.x-m.range+8,y:this.y+m.y,width:m.range,height:m.height,name:this.move};}
 hurtBox(){const crouch=this.crouching||this.state==='crouch';return{x:this.x+12,y:this.y+(crouch?68:12),width:this.width-24,height:crouch?96:this.height-12};}

function cmdPlayer(){return{left:input.heldNow('left'),right:input.heldNow('right'),down:input.heldNow('down'),block:input.heldNow('block'),jump:input.consume('jump'),punch:input.consume('punch'),kick:input.consume('kick'),ki:input.consume('ki'),special:input.consume('special'),dash:input.consume('dash')}}
function poly(points,fill,stroke='#11131a',lw=3){ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.lineJoin='round';ctx.stroke();}}

function ellipse(x,y,rx,ry,fill,stroke='#11131a',lw=3){ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}}

function drawGoku(f,t){

function drawVegeta(f,t){const p=pose(f),outline='#11131a',skin='#edab79',blue=f.flash>0?'#fff':'#182b99',blue2='#0e1d70',white='#eef2fb',gray='#c8d0e0',gold='#d8a637',dark='#080b12';
 if(['ki','special'].includes(f.move)){const x=f.move==='special'?72:66,y=-94,r=f.move==='special'?25:15;const grad=ctx.createRadialGradient(x,y,2,x,y,r*2.5);grad.addColorStop(0,'#fff');grad.addColorStop(.28,'#df9bff');grad.addColorStop(.62,'#8a31e8');grad.addColorStop(1,'rgba(120,30,240,0)');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,r*2.5,0,Math.PI*2);ctx.fill();}

class CPU{constructor(){this.t=0;this.intent={};}reset(){this.t=0;this.intent={};}update(dt,s,o){this.t-=dt;if(this.t>0)return this.intent;this.t=.07+Math.random()*.11;const dx=o.x-s.x,d=Math.abs(dx),toward=dx>0?'right':'left',away=dx>0?'left':'right',c={};if(s.hitstun>0||s.blockstun>0)return c;if(o.move&&d<150&&Math.random()<.62){c.block=true;return c;}if(d>300){c[toward]=true;if(s.energy>=35&&Math.random()<.18)c.special=true;else if(s.energy>=8&&Math.random()<.26)c.ki=true;if(d>470&&Math.random()<.12)c.dash=true;return c;}if(d<62&&Math.random()<.2){c[away]=true;return c;}if(s.canAct()){const r=Math.random();if(d<88&&r<.44)c.punch=true;else if(d<125&&r<.7)c.kick=true;else if(s.energy>=8&&r<.9)c.ki=true;else if(s.energy>=35)c.special=true;else c[toward]=true;}if(Math.random()<.04)c.jump=true;return c;}}
const input=new InputManager(),cpu=new CPU(),goku=new Fighter('goku',175),vegeta=new Fighter('vegeta',720,true),projectiles=[],particles=[];let running=false,last=0,acc=0,shake=0,banner='',bannerT=0;
function overlap(a,b){return a.x<b.x+b.width&&a.x+a.width>b.x&&a.y<b.y+b.height&&a.y+a.height>b.y;}
function reset(){goku.reset();vegeta.reset();cpu.reset();projectiles.length=0;particles.length=0;shake=0;banner='FIGHT!';bannerT=.8;running=true;overlay.classList.add('hidden');input.clear();controlStatus.textContent='Controls ready';}
startBtn.addEventListener('click',reset);restartBtn.addEventListener('click',reset);
function melee(att,def){const b=att.meleeBox();if(!b)return;if(overlap(b,def.hurtBox())){att.hitOnce=true;const blocked=def.receive(att,b.name);if(!blocked){att.combo++;att.comboT=1.1;att.energy=clamp(att.energy+5,0,100);}impact(def.x+def.width/2,def.y+70,COLORS[att.kind].aura,b.name==='kick'?22:13);shake=Math.max(shake,b.name==='kick'?7:3);}}
function spawn(f){if(!['ki','special'].includes(f.move)||f.spawned)return;const m=MOVES[f.move];if(f.moveT<m.startup)return;f.spawned=true;const beam=f.move==='special';projectiles.push({owner:f,kind:f.kind,type:f.move,x:f.facing>0?f.x+f.width+15:f.x-15,y:f.y+80,vx:f.facing*(beam?720:610),life:beam?1.15:1.45,r:beam?25:13,w:beam?95:26});}
function updateProjectiles(dt){for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.x+=p.vx*dt;p.life-=dt;const target=p.owner===goku?vegeta:goku;const box={x:p.vx>0?p.x:p.x-p.w,y:p.y-p.r,width:p.w,height:p.r*2};if(overlap(box,target.hurtBox())){const blocked=target.receive(p.owner,p.type);if(!blocked){p.owner.combo++;p.owner.comboT=1.1;p.owner.energy=clamp(p.owner.energy+7,0,100);}impact(p.x,p.y,COLORS[p.kind].aura,p.type==='special'?34:18);shake=p.type==='special'?12:6;projectiles.splice(i,1);continue;}if(p.life<=0||p.x<-140||p.x>1100)projectiles.splice(i,1);}}
function impact(x,y,color,n=16){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=90+Math.random()*390;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.2+Math.random()*.3,max:.5,size:2+Math.random()*5,color});}}
function bodyPush(a,b){if(!a.onGround||!b.onGround)return;const o=Math.min(a.x+a.width,b.x+b.width)-Math.max(a.x,b.x);if(o<=0)return;const p=o/2+.2;if(a.x<b.x){a.x-=p;b.x+=p}else{a.x+=p;b.x-=p}a.x=clamp(a.x,WORLD.left,WORLD.right-a.width);b.x=clamp(b.x,WORLD.left,WORLD.right-b.width);}

function drawStage(t){const sky=ctx.createLinearGradient(0,0,0,WORLD.height);sky.addColorStop(0,'#3e76bc');sky.addColorStop(.48,'#d89365');sky.addColorStop(1,'#493f42');ctx.fillStyle=sky;ctx.fillRect(0,0,960,540);ctx.fillStyle='rgba(255,239,182,.32)';ctx.beginPath();ctx.arc(800,90,62,0,Math.PI*2);ctx.fill();poly([[0,343],[100,255],[190,326],[290,210],[390,334],[495,240],[600,338],[720,215],[830,330],[960,245],[960,456],[0,456]],'#765856',null);poly([[0,396],[145,312],[255,397],[390,300],[520,400],[665,307],[800,397],[915,318],[960,355],[960,456],[0,456]],'#443b3f',null);ctx.fillStyle='#a4744f';ctx.fillRect(0,WORLD.floorY,960,84);ctx.fillStyle='#765039';for(let i=0;i<30;i++){const x=(i*71+31)%960;ctx.beginPath();ctx.ellipse(x,WORLD.floorY+20+(i%3)*15,14+(i%4)*5,4+(i%2)*2,0,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(255,255,255,.18)';for(let i=0;i<10;i++){const x=(i*127+t*8)%1050-50;ctx.fillRect(x,170+(i%4)*29,34,2);}}
