<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05070d">
  <title>Saiyan MUGEN Browser Prototype</title>
  <style>
    :root { color-scheme: dark; --panel:#111522; --line:#30374a; --text:#f7f8ff; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; min-height:100%; background:#05070d; color:var(--text); font-family:system-ui,-apple-system,sans-serif; overscroll-behavior:none; }
    body { min-height:100dvh; padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left)); }
    main { width:min(980px,100%); margin:auto; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    h1 { margin:0; font-size:clamp(1rem,4.8vw,1.8rem); letter-spacing:.08em; }
    #restart { border:1px solid #68718d; background:#161b2b; color:#fff; border-radius:8px; padding:9px 12px; font-weight:800; }
    .screen { position:relative; width:100%; aspect-ratio:16/9; border:2px solid #252b3b; background:#000; overflow:hidden; box-shadow:0 18px 50px #000a; }
    canvas { display:block; width:100%; height:100%; image-rendering:pixelated; touch-action:none; }
    .overlay { position:absolute; inset:0; display:grid; place-items:center; background:#000a; text-align:center; padding:20px; }
    .overlay.hidden { display:none; }
    .card { background:#111522f2; border:1px solid #384057; padding:22px; max-width:460px; }
    .card h2 { margin:0 0 8px; }
    .card p { margin:0 0 16px; color:#aeb5ca; line-height:1.4; }
    .card button { border:1px solid #fff; background:#fff; color:#080a11; font-weight:900; padding:11px 18px; }
    .controls { display:grid; grid-template-columns:1fr 1.25fr; gap:12px; padding-top:10px; touch-action:none; user-select:none; -webkit-user-select:none; }
    .dpad { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,56px); gap:6px; }
    .actions { display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,56px); gap:6px; }
    .btn { border:1px solid #47506a; background:linear-gradient(#1a2031,#101522); color:#fff; font-weight:1000; font-size:1rem; border-radius:8px; touch-action:none; }
    .btn.active,.btn:active { transform:translateY(2px); filter:brightness(1.5); }
    .empty { visibility:hidden; }
    .hint { display:flex; justify-content:space-between; gap:10px; color:#7f879e; font-size:.68rem; padding:7px 2px 0; }
    @media (max-width:560px) {
      .controls { grid-template-columns:1fr 1.2fr; gap:8px; }
      .dpad,.actions { grid-template-rows:repeat(2,50px); gap:5px; }
      .btn { font-size:.9rem; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <h1>MUGEN BROWSER TEST</h1>
    <button id="restart" type="button">RESTART</button>
  </header>

  <section class="screen">
    <canvas id="game" width="640" height="360" aria-label="MUGEN-style fighting game"></canvas>
    <div id="overlay" class="overlay">
      <div class="card">
        <h2>GOKU VS VEGETA</h2>
        <p>Fixed 60-tick combat, MUGEN-style states, frame hitboxes, six attack buttons, block, dash, projectiles, and separate character modules.</p>
        <button id="start" type="button">START FIGHT</button>
      </div>
    </div>
  </section>

  <section class="controls" aria-label="Touch controls">
    <div class="dpad">
      <button class="btn" data-input="left">◀</button>
      <button class="btn" data-input="up">▲</button>
      <button class="btn" data-input="right">▶</button>
      <button class="btn empty">•</button>
      <button class="btn" data-input="down">▼</button>
      <button class="btn" data-input="guard">G</button>
    </div>
    <div class="actions">
      <button class="btn" data-input="x">X</button>
      <button class="btn" data-input="y">Y</button>
      <button class="btn" data-input="z">Z</button>
      <button class="btn" data-input="a">A</button>
      <button class="btn" data-input="b">B</button>
      <button class="btn" data-input="c">C</button>
    </div>
  </section>

  <div class="hint"><span>X/Y punches · A/B kicks</span><span>Z ki blast · C beam</span></div>
</main>
<script type="module" src="./game.js"></script>
</body>
</html>
